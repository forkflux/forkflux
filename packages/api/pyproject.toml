[project]
name = "forkflux-api"
version = "0.1.0"
description = "Core API server and coordination bus for cross-device AI agent task handoff."
readme = "README.md"
requires-python = ">=3.14"
keywords = [
    "ai",
    "agents",
    "multi-agent",
    "coordination",
    "handoff",
    "developer-tools",
    "llm",
    "task-delegation",
    "fastapi"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Distributed Computing",
]

dependencies = [
    "aiosqlite==0.22.1",
    "alembic==1.18.4",
    "alembic-postgresql-enum==1.10.0",
    "asyncpg==0.31.0",
    "fastapi==0.137.2",
    "gunicorn==26.0.0",
    "httpx==0.28.1",
    "pydantic==2.13.4",
    "pydantic-settings==2.14.1",
    "sqlalchemy==2.0.51",
    "structlog==26.1.0",
    "typer==0.26.7",
    "uvicorn==0.49.0",
]

[dependency-groups]
dev = [
    "polyfactory==3.3.0",
    "testcontainers[postgres]==4.14.2",
]

[project.urls]
Homepage = "https://github.com/forkflux/forkflux"
Repository = "https://github.com/forkflux/forkflux"
Issues = "https://github.com/forkflux/forkflux/issues"

[project.scripts]
forkflux = "forkflux_api.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
include = [
    "forkflux_api/**",
]

[tool.hatch.build.targets.wheel]
packages = ["forkflux_api"]

[tool.alembic]
script_location = "%(here)s/forkflux_api/migrations"
file_template = "%%(year)d/%%(month).2d/%%(day).2d_%%(hour).2d%%(minute).2d_%%(second).2d_%%(rev)s_%%(slug)s"
prepend_sys_path = [
    "."
]
timezone = "UTC"
sqlalchemy.url = "driver_not_set"

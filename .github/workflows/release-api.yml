name: Release API

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write
  id-token: none

jobs:
  release-api:
    if: startsWith(github.event.release.tag_name, 'ff-api@')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse and validate release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"

          if [[ ! "$TAG" =~ ^ff-api@([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Invalid API tag format: $TAG"
            echo "Expected format: ff-api@X.Y.Z"
            exit 1
          fi

          VERSION="${BASH_REMATCH[1]}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag version matches packages/api/pyproject.toml
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          PROJECT_VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path('packages/api/pyproject.toml').read_text())
          print(data['project']['version'])
          PY
          )"

          if [[ "$TAG_VERSION" != "$PROJECT_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match packages/api/pyproject.toml version ($PROJECT_VERSION)"
            exit 1
          fi

      - name: Build API image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: etc/Dockerfile.api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/forkflux/forkflux-api:latest
            ghcr.io/forkflux/forkflux-api:${{ steps.tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Build API package
        run: |
          uv build packages/api

      - name: Publish API package to PyPI with uv
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish

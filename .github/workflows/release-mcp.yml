name: Release MCP

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  release-mcp:
    if: startsWith(github.event.release.tag_name, 'ff-mcp@')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse and validate release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"

          if [[ ! "$TAG" =~ ^ff-mcp@([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Invalid MCP tag format: $TAG"
            echo "Expected format: ff-mcp@X.Y.Z"
            exit 1
          fi

          VERSION="${BASH_REMATCH[1]}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag version matches packages/mcp/pyproject.toml
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          PROJECT_VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path('packages/mcp/pyproject.toml').read_text())
          print(data['project']['version'])
          PY
          )"

          if [[ "$TAG_VERSION" != "$PROJECT_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match packages/mcp/pyproject.toml version ($PROJECT_VERSION)"
            exit 1
          fi

      - name: Build MCP image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: etc/Dockerfile.mcp
          push: true
          tags: |
            ghcr.io/forkflux/forkflux-mcp:latest
            ghcr.io/forkflux/forkflux-mcp:${{ steps.tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Build MCP package
        run: |
          uv build packages/mcp

      - name: Publish MCP package to PyPI with uv
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Set version in server.json
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" packages/mcp/server.json

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish packages/mcp/server.json
